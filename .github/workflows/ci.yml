name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Test & Analysis
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        channel: 'stable'

    - name: Setup environment file
      run: |
        cp .env.example .env
        echo "SUPABASE_URL=https://mock.supabase.co" >> .env
        echo "SUPABASE_ANON_KEY=mock-key-for-ci" >> .env
        echo "SUPABASE_AUTH_REDIRECT_URL=https://mock.supabase.co/auth/v1/callback" >> .env

    - name: Install dependencies
      run: flutter pub get

    - name: Analyze code
      run: flutter analyze --no-pub
      continue-on-error: true

    - name: Run tests
      run: flutter test --exclude-tags integration

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for secrets
      run: |
        echo "Checking for exposed secrets in lib/ and assets/..."
        if grep -r "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" lib/ assets/ --include="*.dart" --include="*.yaml" --include="*.json" 2>/dev/null; then
          echo "❌ JWT tokens found in lib/ or assets/!"
          exit 1
        fi
        if grep -r "https://[a-z0-9]*\.supabase\.co" lib/ assets/ --include="*.dart" --include="*.yaml" --include="*.json" 2>/dev/null; then
          echo "❌ Supabase URLs found in lib/ or assets/!"
          exit 1
        fi
        echo "✅ No secrets detected"

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        channel: 'stable'

    - name: Setup environment file
      run: cp .env.example .env

    - name: Install dependencies
      run: flutter pub get

    - name: Count print() statements
      run: |
        count=$(grep -r "print(" lib/ --include="*.dart" | wc -l)
        echo "ℹ️ $count print() statements found (objectif : 0, story 10.6)"

    - name: Count TODO comments
      run: |
        todos=$(grep -r "TODO\|FIXME\|XXX\|HACK" lib/ --include="*.dart" | wc -l)
        echo "ℹ️ $todos TODO/FIXME comments found"

  deploy-staging:
    name: Deploy to Staging
    needs: [test, security, quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        channel: 'stable'

    - name: Build web app
      run: flutter build web --release

    # Add deployment steps here (Firebase Hosting, etc.)

  deploy-production:
    name: Deploy to Production
    needs: [test, security, quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.32.8'
        channel: 'stable'

    - name: Setup environment file
      run: |
        cp .env.example .env
        echo "SUPABASE_URL=https://mock.supabase.co" >> .env
        echo "SUPABASE_ANON_KEY=mock-key-for-ci" >> .env
        echo "SUPABASE_AUTH_REDIRECT_URL=https://mock.supabase.co/auth/v1/callback" >> .env

    - name: Install dependencies
      run: flutter pub get

    - name: Build release web
      run: flutter build web --release

    # Add production deployment steps here
