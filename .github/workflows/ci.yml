name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ── Gate dur : bloque le deploy si un secret est exposé ──────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for secrets
      run: |
        echo "Checking for exposed secrets in lib/ and assets/..."
        if grep -r "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9" lib/ assets/ \
            --include="*.dart" --include="*.yaml" --include="*.json" 2>/dev/null; then
          echo "❌ JWT tokens found in lib/ or assets/!"
          exit 1
        fi
        if grep -r "https://[a-z0-9]*\.supabase\.co" lib/ assets/ \
            --include="*.dart" --include="*.yaml" --include="*.json" 2>/dev/null; then
          echo "❌ Supabase URLs found in lib/ or assets/!"
          exit 1
        fi
        echo "✅ No secrets detected"

  # ── Informatif : tests unitaires (ne bloque pas le deploy) ───────────────
  test:
    name: Test & Analysis
    runs-on: ubuntu-latest
    continue-on-error: true  # informational — ne bloque pas deploy-production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Resolve authoritative Flutter version
      id: flutter
      shell: bash
      run: |
        version="$(head -n1 .flutter-version | tr -d '[:space:]')"
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::.flutter-version absent, vide ou mal formé (lu : '$version')"
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.flutter.outputs.version }}
        channel: 'stable'

    - name: Verify Flutter version matches .flutter-version
      shell: bash
      run: |
        expected='${{ steps.flutter.outputs.version }}'
        actual="$(flutter --version | head -n1 | awk '{print $2}')"
        if [ "$actual" != "$expected" ]; then
          echo "::error::Flutter $actual installé, $expected attendu (.flutter-version)"
          exit 1
        fi
        echo "✅ Flutter $actual conforme à .flutter-version"
        dart --version

    - name: Setup environment file
      run: |
        cp .env.example .env
        echo "SUPABASE_URL=https://mock.supabase.co" >> .env
        echo "SUPABASE_ANON_KEY=mock-key-for-ci" >> .env
        echo "SUPABASE_AUTH_REDIRECT_URL=https://mock.supabase.co/auth/v1/callback" >> .env

    - name: Install dependencies
      run: flutter pub get

    - name: Analyze code
      run: flutter analyze --no-pub
      continue-on-error: true

    - name: Run tests
      run: flutter test --exclude-tags integration
      continue-on-error: true

  # ── Informatif : qualité code (ne bloque pas le deploy) ──────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true  # informational — ne bloque pas deploy-production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Count print() statements
      run: |
        count=$(grep -r "print(" lib/ --include="*.dart" | wc -l)
        echo "ℹ️ $count print() statements (objectif : 0, story 10.6)"

    - name: Count TODO comments
      run: |
        todos=$(grep -r "TODO\|FIXME\|XXX\|HACK" lib/ --include="*.dart" | wc -l)
        echo "ℹ️ $todos TODO/FIXME comments"

  # ── Deploy production — gate : security uniquement ───────────────────────
  deploy-production:
    name: Deploy to Production (web build check)
    needs: [security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Resolve authoritative Flutter version
      id: flutter
      shell: bash
      run: |
        version="$(head -n1 .flutter-version | tr -d '[:space:]')"
        if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::.flutter-version absent, vide ou mal formé (lu : '$version')"
          exit 1
        fi
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.flutter.outputs.version }}
        channel: 'stable'

    - name: Verify Flutter version matches .flutter-version
      shell: bash
      run: |
        expected='${{ steps.flutter.outputs.version }}'
        actual="$(flutter --version | head -n1 | awk '{print $2}')"
        if [ "$actual" != "$expected" ]; then
          echo "::error::Flutter $actual installé, $expected attendu (.flutter-version)"
          exit 1
        fi
        echo "✅ Flutter $actual conforme à .flutter-version"

    - name: Setup environment file
      run: |
        cp .env.example .env
        echo "SUPABASE_URL=https://mock.supabase.co" >> .env
        echo "SUPABASE_ANON_KEY=mock-key-for-ci" >> .env
        echo "SUPABASE_AUTH_REDIRECT_URL=https://mock.supabase.co/auth/v1/callback" >> .env

    - name: Install dependencies
      run: flutter pub get

    - name: Build release web
      run: flutter build web --release
